name: Run Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  Test:
    strategy:
      fail-fast: false
      matrix:
        go: [ '1.24', '1.23', '1.22' ]
    uses: bytemare/workflows/.github/workflows/test-go.yaml@e6762a2805d110f9eff20ea70c798c2bd406e416
    with:
      version: ${{ matrix.go }}
